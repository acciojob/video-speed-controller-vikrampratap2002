<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom Video Player</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e2b3c, #0f1a24);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    
    .player {
      max-width: 800px;
      width: 90vw;
      border-radius: 1.2rem;
      overflow: hidden;
      box-shadow: 0 25px 40px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,255,255,0.05);
      background: #000;
    }
    
    .player__video {
      width: 100%;
      display: block;
      cursor: pointer;
      background-color: #0b1219;
    }
    
    .player__controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.2rem;
      background: rgba(18, 28, 40, 0.95);
      backdrop-filter: blur(6px);
      border-top: 1px solid rgba(255,255,255,0.1);
      color: white;
    }
    
    .toggle {
      background: none;
      border: 0;
      color: inherit;
      font-size: 1.6rem;
      font-weight: 500;
      padding: 0 0.5rem;
      line-height: 1;
      cursor: pointer;
      min-width: 3rem;
      text-align: center;
      transition: transform 0.1s ease, text-shadow 0.1s;
    }
    
    .toggle:hover {
      transform: scale(1.07);
      text-shadow: 0 0 8px #ffffff80;
    }
    
    .toggle:active {
      transform: scale(0.98);
    }
    
    .progress {
      flex: 10 1 220px;
      display: flex;
      flex-basis: 100%;
      height: 14px;
      background: rgba(255,255,255,0.15);
      border-radius: 30px;
      cursor: pointer;
      margin: 0.2rem 0 0.6rem 0;
      box-shadow: inset 0 1px 4px #00000080;
      order: -1;
    }
    
    .progress__filled {
      width: 0%;
      background: linear-gradient(90deg, #f7c948, #ffb347);
      border-radius: 30px;
      height: 100%;
      transition: width 0.05s linear;
      box-shadow: 0 0 10px #f7b42c;
    }
    
    .player__slider {
      width: 90px;
      height: 6px;
      background: transparent;
      accent-color: #ffb347;
      border-radius: 10px;
      cursor: pointer;
    }
    
    .player__slider:focus {
      outline: 1px solid #ffb347;
    }
    
    .rewind {
      background: none;
      border: 0;
      color: inherit;
      font-size: 1rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      cursor: pointer;
      background: rgba(255,255,255,0.06);
      border-radius: 2rem;
      transition: transform 0.1s ease, text-shadow 0.1s;
    }
    
    .rewind:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.1);
    }
    
    .rewind:active {
      transform: scale(0.98);
    }
    
    .skip-forward {
      background: none;
      border: 0;
      color: inherit;
      font-size: 1rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      cursor: pointer;
      background: rgba(255,255,255,0.06);
      border-radius: 2rem;
      transition: transform 0.1s ease, text-shadow 0.1s;
    }
    
    .skip-forward:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.1);
    }
    
    .skip-forward:active {
      transform: scale(0.98);
    }
    
    .left-group {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .right-group {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-left: auto;
    }
    
    .time-controls {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      margin-left: auto;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      background: #1e2f3f;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      color: #ddd;
    }
    
    .time-display {
      font-family: monospace;
      font-weight: 500;
    }
    
    @media (max-width: 500px) {
      .player__controls {
        padding: 0.6rem;
        gap: 0.4rem;
      }
      .player__slider {
        width: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="player">
    <video class="player__video" src="https://www.w3schools.com/html/mov_bbb.mp4"></video>

    <div class="player__controls">
      <!-- Progress bar -->
      <div class="progress">
        <div class="progress__filled" style="width:0%"></div>
      </div>

      <!-- Left side controls -->
      <div class="left-group">
        <button class="toggle" title="Play/Pause">►</button>
        <button class="rewind">« 10s</button>
        <button class="skip-forward">25s »</button>
      </div>

      <!-- Right side controls -->
      <div class="right-group">
        <span style="font-size:1.2rem; opacity:0.7;">🔊</span>
        <input type="range" name="volume" class="player__slider" min="0" max="1" step="0.05" value="1" data-volume>
        
        <span style="font-size:1rem; opacity:0.7;">⏩</span>
        <input type="range" name="playbackSpeed" class="player__slider" min="0.5" max="2.5" step="0.1" value="1" data-speed>
        
        <div class="time-controls">
          <span class="time-display" id="timeCurrent">0:00</span>
          <span>/</span>
          <span class="time-display" id="timeDuration">0:00</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Get all elements
    const video = document.querySelector('.player__video');
    const toggleBtn = document.querySelector('.toggle');
    const rewindBtn = document.querySelector('.rewind');
    const skipForwardBtn = document.querySelector('.skip-forward');
    const progress = document.querySelector('.progress');
    const progressFilled = document.querySelector('.progress__filled');
    const volumeSlider = document.querySelector('[data-volume]');
    const speedSlider = document.querySelector('[data-speed]');
    const timeCurrent = document.getElementById('timeCurrent');
    const timeDuration = document.getElementById('timeDuration');

    // Format time helper
    function formatTime(seconds) {
      if (isNaN(seconds) || seconds < 0) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    // Update play/pause button
    function updateToggleButton() {
      if (video.paused) {
        toggleBtn.textContent = '►';
      } else {
        toggleBtn.textContent = '❚ ❚';
      }
    }

    // Toggle play/pause
    function togglePlay() {
      if (video.paused) {
        video.play();
      } else {
        video.pause();
      }
      updateToggleButton();
    }

    // Rewind 10 seconds
    function rewind() {
      video.currentTime = Math.max(0, video.currentTime - 10);
    }

    // Skip forward 25 seconds
    function skipForward() {
      video.currentTime = Math.min(video.duration, video.currentTime + 25);
    }

    // Update progress and time
    function updateProgress() {
      if (video.duration) {
        const percent = (video.currentTime / video.duration) * 100;
        progressFilled.style.width = `${percent}%`;
        timeCurrent.textContent = formatTime(video.currentTime);
        timeDuration.textContent = formatTime(video.duration);
      }
    }

    // Scrub through video
    function scrub(e) {
      const rect = progress.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const width = rect.width;
      const percent = Math.min(1, Math.max(0, clickX / width));
      if (video.duration) {
        video.currentTime = percent * video.duration;
      }
    }

    // Event listeners
    toggleBtn.addEventListener('click', togglePlay);
    rewindBtn.addEventListener('click', rewind);
    skipForwardBtn.addEventListener('click', skipForward);
    video.addEventListener('click', togglePlay);
    video.addEventListener('play', updateToggleButton);
    video.addEventListener('pause', updateToggleButton);
    video.addEventListener('timeupdate', updateProgress);
    video.addEventListener('loadedmetadata', updateProgress);
    video.addEventListener('ended', updateToggleButton);

    // Volume control
    volumeSlider.addEventListener('input', (e) => {
      video.volume = e.target.value;
    });

    // Playback speed control
    speedSlider.addEventListener('input', (e) => {
      video.playbackRate = parseFloat(e.target.value);
    });

    // Progress bar seeking
    let mousedown = false;
    progress.addEventListener('click', scrub);
    progress.addEventListener('mousedown', () => mousedown = true);
    progress.addEventListener('mousemove', (e) => mousedown && scrub(e));
    progress.addEventListener('mouseup', () => mousedown = false);
    progress.addEventListener('mouseleave', () => mousedown = false);

    // Volume and speed labels
    const volDisplay = document.createElement('span');
    volDisplay.style.fontSize = '0.8rem';
    volDisplay.style.minWidth = '35px';
    volDisplay.style.opacity = '0.9';
    volumeSlider.parentNode.insertBefore(volDisplay, volumeSlider.nextSibling);
    
    volumeSlider.addEventListener('input', () => {
      volDisplay.textContent = `${Math.round(volumeSlider.value * 100)}%`;
    });
    volDisplay.textContent = '100%';

    const speedDisplay = document.createElement('span');
    speedDisplay.style.fontSize = '0.8rem';
    speedDisplay.style.minWidth = '35px';
    speedDisplay.style.opacity = '0.9';
    speedSlider.parentNode.insertBefore(speedDisplay, speedSlider.nextSibling);
    
    speedSlider.addEventListener('input', () => {
      speedDisplay.textContent = `${parseFloat(speedSlider.value).toFixed(1)}x`;
    });
    speedDisplay.textContent = '1.0x';
  </script>
</body>
</html>
